name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (default: 2.0.0-alpha-<short-sha>)'
        type: string
        default: ''
      create_release:
        description: 'Create a GitHub Release with binaries'
        type: boolean
        default: false

jobs:
  # --- Linux x86_64 ---
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          V=${{ inputs.version || '' }}
          if [ -n "$V" ]; then
            echo "VERSION=$V" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE}-${GITHUB_SHA:0:6}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev libcurl4-openssl-dev libncurses-dev cmake

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION="${VERSION}"
        working-directory: src/anywheredoor

      - name: Build
        run: cmake --build build
        working-directory: src/anywheredoor

      - name: Rename binary
        run: mv build/anywhere_door anywhere_door-linux-x86_64
        working-directory: src/anywheredoor

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-linux-x86_64
          path: src/anywheredoor/anywhere_door-linux-x86_64

  # --- Linux aarch64 (ARM64, native) ---
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          V=${{ inputs.version || '' }}
          if [ -n "$V" ]; then
            echo "VERSION=$V" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE}-${GITHUB_SHA:0:6}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev libcurl4-openssl-dev libncurses-dev cmake

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION="${VERSION}"
        working-directory: src/anywheredoor

      - name: Build
        run: cmake --build build
        working-directory: src/anywheredoor

      - name: Rename binary
        run: mv build/anywhere_door anywhere_door-linux-aarch64
        working-directory: src/anywheredoor

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-linux-aarch64
          path: src/anywheredoor/anywhere_door-linux-aarch64

  # --- Linux armv7 (ARM 32-bit, cross-compiled via QEMU/Docker) ---
  linux-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          V=${{ inputs.version || '' }}
          if [ -n "$V" ]; then
            echo "VERSION=$V" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE}-${GITHUB_SHA:0:6}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build in armv7 container
        run: |
          docker run --rm \
            --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/src/anywheredoor \
            ubuntu:24.04 \
            bash -c '
              apt-get update &&
              apt-get install -y cmake gcc libyaml-dev libcurl4-openssl-dev libncurses-dev make &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION="${VERSION}" &&
              cmake --build build
            '
          sudo chown -R $(id -u):$(id -g) src/anywheredoor/build

      - name: Rename binary
        run: mv build/anywhere_door anywhere_door-linux-armv7
        working-directory: src/anywheredoor

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-linux-armv7
          path: src/anywheredoor/anywhere_door-linux-armv7

  # --- Linux i386 (32-bit x86, via QEMU/Docker; Ubuntu dropped 32-bit) ---
  linux-i386:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          V=${{ inputs.version || '' }}
          if [ -n "$V" ]; then
            echo "VERSION=$V" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE}-${GITHUB_SHA:0:6}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build in i386 container
        run: |
          docker run --rm \
            --platform linux/386 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/src/anywheredoor \
            debian:bookworm \
            bash -c '
              apt-get update &&
              apt-get install -y cmake gcc libyaml-dev libcurl4-openssl-dev libncurses-dev make &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION="${VERSION}" &&
              cmake --build build
            '
          sudo chown -R $(id -u):$(id -g) src/anywheredoor/build

      - name: Rename binary
        run: mv build/anywhere_door anywhere_door-linux-i386
        working-directory: src/anywheredoor

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-linux-i386
          path: src/anywheredoor/anywhere_door-linux-i386

  # --- Linux riscv64 (RISC-V 64-bit, via QEMU/Docker) ---
  linux-riscv64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          V=${{ inputs.version || '' }}
          if [ -n "$V" ]; then
            echo "VERSION=$V" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE}-${GITHUB_SHA:0:6}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build in riscv64 container
        run: |
          docker run --rm \
            --platform linux/riscv64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/src/anywheredoor \
            ubuntu:24.04 \
            bash -c '
              apt-get update &&
              apt-get install -y cmake gcc libyaml-dev libcurl4-openssl-dev libncurses-dev make &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION="${VERSION}" &&
              cmake --build build
            '
          sudo chown -R $(id -u):$(id -g) src/anywheredoor/build

      - name: Rename binary
        run: mv build/anywhere_door anywhere_door-linux-riscv64
        working-directory: src/anywheredoor

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-linux-riscv64
          path: src/anywheredoor/anywhere_door-linux-riscv64

  # --- macOS (arm64 native + x86_64 cross-compile) ---
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          V=${{ inputs.version || '' }}
          if [ -n "$V" ]; then
            echo "VERSION=$V" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE}-${GITHUB_SHA:0:6}" >> $GITHUB_ENV
          fi

      - name: Install dependencies (arm64)
        run: brew install libyaml curl ncurses cmake

      # --- arm64 native ---
      - name: Configure (arm64)
        run: cmake -B build_arm64 -DCMAKE_BUILD_TYPE=Release -DVERSION="${VERSION}"
        working-directory: src/anywheredoor

      - name: Build (arm64)
        run: cmake --build build_arm64
        working-directory: src/anywheredoor

      - name: Rename (arm64)
        run: mv build_arm64/anywhere_door anywhere_door-darwin-arm64
        working-directory: src/anywheredoor

      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-darwin-arm64
          path: src/anywheredoor/anywhere_door-darwin-arm64

      # --- x86_64 cross-compile ---
      - name: Build libyaml for x86_64
        run: |
          curl -sL https://github.com/yaml/libyaml/archive/refs/tags/0.2.5.tar.gz | tar xz
          cd libyaml-0.2.5
          sed -i.bak 's/cmake_minimum_required(VERSION 3.0)/cmake_minimum_required(VERSION 3.5)/' CMakeLists.txt
          cmake -B build -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_INSTALL_PREFIX=/tmp/libyaml-x86 -DBUILD_SHARED_LIBS=OFF
          cmake --build build
          cmake --install build

      - name: Configure (x86_64)
        run: |
          cmake -B build_x86_64 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DVERSION="${VERSION}" \
            -DYAML_LIBRARY=/tmp/libyaml-x86/lib/libyaml.a \
            -DYAML_INCLUDE_DIR=/tmp/libyaml-x86/include
        working-directory: src/anywheredoor

      - name: Build (x86_64)
        run: cmake --build build_x86_64
        working-directory: src/anywheredoor

      - name: Rename (x86_64)
        run: mv build_x86_64/anywhere_door anywhere_door-darwin-x86_64
        working-directory: src/anywheredoor

      - name: Upload artifact (x86_64)
        uses: actions/upload-artifact@v7
        with:
          name: anywhere_door-darwin-x86_64
          path: src/anywheredoor/anywhere_door-darwin-x86_64

  # --- Create GitHub Release on tag ---
  release:
    needs: [linux-x86_64, linux-aarch64, linux-armv7, linux-i386, linux-riscv64, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -exec ls -la {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "AnywhereDoor ${{ github.ref_name }}"
          body: |
            ## AnywhereDoor ${{ github.ref_name }}

            Prebuilt binaries for Linux and macOS.

            ### Installation
            ```bash
            curl -o install.sh https://raw.githubusercontent.com/YaoYinYing/AnywhereDoor/main/install.sh
            chmod +x install.sh
            ./install.sh
            ```

            ### Manual download
            Download the binary for your platform, make it executable, and place it in your PATH:
            - `anywhere_door-linux-x86_64` — Linux amd64
            - `anywhere_door-linux-aarch64` — Linux ARM64 (Raspberry Pi 4/5, etc.)
            - `anywhere_door-linux-armv7` — Linux ARM 32-bit (Raspberry Pi 2/3, etc.)
            - `anywhere_door-linux-i386` — Linux 32-bit x86
            - `anywhere_door-linux-riscv64` — Linux RISC-V 64-bit
            - `anywhere_door-darwin-arm64` — macOS Apple Silicon
            - `anywhere_door-darwin-x86_64` — macOS Intel
          files: |
            artifacts/anywhere_door-linux-x86_64/anywhere_door-linux-x86_64
            artifacts/anywhere_door-linux-aarch64/anywhere_door-linux-aarch64
            artifacts/anywhere_door-linux-armv7/anywhere_door-linux-armv7
            artifacts/anywhere_door-linux-i386/anywhere_door-linux-i386
            artifacts/anywhere_door-linux-riscv64/anywhere_door-linux-riscv64
            artifacts/anywhere_door-darwin-arm64/anywhere_door-darwin-arm64
            artifacts/anywhere_door-darwin-x86_64/anywhere_door-darwin-x86_64
          draft: false
          prerelease: false
